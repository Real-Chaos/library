<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/all.css" integrity="sha384-vSIIfh2YWi9wW0r9iZe7RJPrKwp6bG+s9QZMoITbCckVJqGCCRhc+ccxNcdpHuYu" crossorigin="anonymous">
</head>
<body>
    <div class="logo" id="top">
        <div class="logoimg">
        <img src="images/logo.jpg" alt="">
        </div>
        <div class="theme">
            <i class="fas fa-sun lightMode"></i>
        </div>
    </div>
    <header>
        <!-- <h1><span class="redColor">My Library</span></h1> -->
        <nav class="navBar">
            <ul>
                <li><img class="profileImg" src="images/profileImg.png" alt=""></li>
                <li><a>Home</a></li>
                <li><a href="#novels">My Novels</a></li>
                <li><a href="#anime">My Anime</a></li>
                <li><a href="#manga">My Manga</a></li>
            </ul>
        </nav>
        <div class="mobileNav">
            <i class="fas fa-bars hamburgerMenu"></i>
        </div>
    </header>
    <div class="changeProfile">
        <label for="Profile Change">Enter URL</label>
        <input type="text" placeholder="Enter URL">
    </div>
    <main>
        <div class="changeCoverImage">
            <div class="changeImageForm">
                <h4 class="closeBtn">x</h4>
                <h1>Change Cover</h1>
                <input class="newImage" type="text" placeholder="Enter Image URL">
                <button class="changeCoverBtn">Change Cover!</button>
            </div>
            <img class="coverImg" src="images/libraryCover.jpeg" alt="">
            <div class="favorite">
            
            </div>

            <div class="addToLibrary">
                <h1>Add to Library</h1>
                <button class="addNovel">Add Novel <i class="fas fa-plus"></i></button>
                <button class="addAnime">Add Anime <i class="fas fa-plus"></i></button>
                <button class="addManga">Add Manga <i class="fas fa-plus"></i></button>
            </div>
        </div>
        <div class="main">
        <div class="novelSection" id="novels">
            <h1 class="novelh1">Novels</h1>
            <div class="newNovel">
                <div class="novelSectionItem">
                    <img src="https://blog.cloudflare.com/content/images/image00.jpg" alt="">
                    <h1 class="title">Title</h1>
                    <ul>
                       <li>Author: </li>
                       <li>Pages: </li>
                       <li>Status: </li>
                    </ul>
                    <button class="addToFavorite">Add to favorite</button>
                    <button class="top5">Add to Top 5</button>
                    <button class="remove">Remove</button>
                </div>
                <div class="novelSectionItem">
                    <img src="https://blog.cloudflare.com/content/images/image00.jpg" alt="">
                    <h1 class="title">Title</h1>
                    <ul>
                       <li>Author: </li>
                       <li>Pages: </li>
                       <li>Status: </li>
                    </ul>
                    <button class="addToFavorite">Add to favorite</button>
                    <button class="top5">Add to Top 5</button>
                    <button class="remove">Remove</button>
                </div>
                
                <img src="https://blog.cloudflare.com/content/images/image00.jpg" alt="">
                <img src="https://blog.cloudflare.com/content/images/image00.jpg" alt="">
                <img src="https://blog.cloudflare.com/content/images/image00.jpg" alt="">
            </div>
            <!-- <div class="emptyDiv">
            <h1 class="empty">Currently Empty</h1>
            <img class="emptyImg" src="images/emptyLibrary.svg" alt="">
            </div> -->
        </div>
        
        
        <div class="animeSection" id="anime">
 
            <div class="emptyDiv">
            <h1 class="empty">Currently Empty</h1>
            <img src="images/emptyTV.png" alt="">
            </div>
        </div>
        
        <div class="mangaSection" id="manga">
    
            <div class="emptyDiv">
                <h1 class="empty">Currently Empty</h1>
                <img src="images/mangaIcon.png" alt="">
            </div>
        </div>
        </div>
    
    </main>
    <div class="backToTop">
        <a href="#top"><i class="fas fa-arrow-up topBtn"></i></a>
    </div>
    <div class="footer">
       

        </div>
    
    <script src="app.js"></script>
</body>
</html>
