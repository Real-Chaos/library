<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="images/libraryIcon.png" type="image/png">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/all.css" integrity="sha384-vSIIfh2YWi9wW0r9iZe7RJPrKwp6bG+s9QZMoITbCckVJqGCCRhc+ccxNcdpHuYu" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="titleDiv">
            <h1 class="title">LIBRARY</h1>
        </div>
    </header>
    <div class="newBook">
        <button type="button" class="bookBtn">New Book</button>
    </div>
    <div class="bookForm">
        <i class="fas fa-times closeBtn"></i>
        <form class="form">
            <h1>Add New Book</h1>
            <input type="text" class="bookTitle" placeholder="Title" required>
            <input type="text" class="bookAuthor" placeholder="Author" required>
            <input type="number" class="bookPages" placeholder="Pages" required>
            <button type="button" class="bookBtn submitBtn">Submit</button>
            <button type="reset" class="bookBtn resetBtn">Reset</button>
        </form>
    </div>
    <div class="bookList">

    </div>  
    <script src="app.js"></script>
</body>
</html>
