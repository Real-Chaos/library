<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/all.css" integrity="sha384-vSIIfh2YWi9wW0r9iZe7RJPrKwp6bG+s9QZMoITbCckVJqGCCRhc+ccxNcdpHuYu" crossorigin="anonymous">
</head>
<body>
    <header>
        <h1><span class="redColor">My Library</span></h1>
        <nav class="navBar">
            <ul>
                <li><a href="index.html"><span class="redColor">Home</span></a></li>
                <li>My Novels</li>
                <li>My Anime</li>
                <li>My Manga</li>
            </ul>
        </nav>
        <div class="mobileNav">
            <i class="fas fa-bars hamburgerMenu"></i>
        </div>
    </header>
    <div class="theme">
        <i class="fas fa-sun lightMode"></i>
    </div>
    <main>
        <div class="changeCoverImage">
            <div class="changeImageForm">
                <h4 class="closeBtn">x</h4>
                <h1>Change Cover</h1>
                <input class="newImage" type="text" placeholder="Enter Image URL">
                <button class="changeCoverBtn">Change Cover!</button>
            </div>
            <img class="coverImg" src="https://images.unsplash.com/photo-1569511166187-97eb6e387e19?ixlib=rb-1.2.1&q=80&fm=jpg&crop=entropy&cs=tinysrgb&w=2000&fit=max& ixid=eyJhcHBfaWQiOjExNzczfQ" alt="">
        </div>
        <div class="novelSection">
            <h3>Novels</h3>
            <img src="images/emptyLibrary.svg" alt="">
        </div>
        
        <div class="animeSection">
            <h3>Anime</h3>
            <img src="images/emptyTV.png" alt="">
        </div>
        
        <div class="mangaSection">
            <h3>Manga</h3>
            <img src="images/mangaIcon.png" alt="">
        </div>
    
    </main>
    <script src="app.js"></script>
</body>
</html>
